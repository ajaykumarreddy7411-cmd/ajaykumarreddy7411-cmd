<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1">
        <animate attributeName="stop-color" values="#A78BFA;#06B6D4;#A78BFA" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1">
        <animate attributeName="stop-color" values="#06B6D4;#A78BFA;#06B6D4" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <filter id="aiGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <radialGradient id="nodeGrad">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.5" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="300" fill="#0D1117" rx="15"/>
  
  <!-- Title -->
  <text x="300" y="35" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="url(#aiGrad)" text-anchor="middle" filter="url(#aiGlow)">
    🤖 AI Enthusiast
  </text>
  
  <!-- Neural Network Visualization -->
  <!-- Input Layer -->
  <circle cx="100" cy="80" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="130" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="0.3s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="180" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="0.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="230" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="0.9s" repeatCount="indefinite" />
  </circle>
  
  <!-- Hidden Layer 1 -->
  <circle cx="250" cy="70" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="0.4s" repeatCount="indefinite" />
  </circle>
  <circle cx="250" cy="120" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="0.7s" repeatCount="indefinite" />
  </circle>
  <circle cx="250" cy="170" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="250" cy="220" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="1.3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Hidden Layer 2 -->
  <circle cx="400" cy="100" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="0.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="155" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="1.1s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="210" r="12" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" begin="1.4s" repeatCount="indefinite" />
  </circle>
  
  <!-- Output Layer -->
  <circle cx="520" cy="155" r="15" fill="url(#nodeGrad)" filter="url(#aiGlow)">
    <animate attributeName="r" values="15;18;15" dur="2s" begin="1.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Connections with animation -->
  <!-- Input to Hidden 1 -->
  <line x1="100" y1="80" x2="250" y2="70" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" />
  </line>
  <line x1="100" y1="130" x2="250" y2="120" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0.3s" repeatCount="indefinite" />
  </line>
  <line x1="100" y1="180" x2="250" y2="170" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0.6s" repeatCount="indefinite" />
  </line>
  <line x1="100" y1="230" x2="250" y2="220" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0.9s" repeatCount="indefinite" />
  </line>
  
  <!-- Hidden 1 to Hidden 2 -->
  <line x1="250" y1="70" x2="400" y2="100" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0.5s" repeatCount="indefinite" />
  </line>
  <line x1="250" y1="120" x2="400" y2="155" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="0.8s" repeatCount="indefinite" />
  </line>
  <line x1="250" y1="170" x2="400" y2="155" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="1.1s" repeatCount="indefinite" />
  </line>
  <line x1="250" y1="220" x2="400" y2="210" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="1.4s" repeatCount="indefinite" />
  </line>
  
  <!-- Hidden 2 to Output -->
  <line x1="400" y1="100" x2="520" y2="155" stroke="url(#aiGrad)" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="1s" repeatCount="indefinite" />
  </line>
  <line x1="400" y1="155" x2="520" y2="155" stroke="url(#aiGrad)" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="1.3s" repeatCount="indefinite" />
  </line>
  <line x1="400" y1="210" x2="520" y2="155" stroke="url(#aiGrad)" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" begin="1.6s" repeatCount="indefinite" />
  </line>
  
  <!-- Data flow particles -->
  <circle r="3" fill="#A78BFA">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#dataPath1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <path id="dataPath1" d="M 100 80 L 250 70 L 400 100 L 520 155" fill="none"/>
  
  <circle r="3" fill="#06B6D4">
    <animateMotion dur="3s" begin="1s" repeatCount="indefinite">
      <mpath href="#dataPath2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite" />
  </circle>
  
  <path id="dataPath2" d="M 100 180 L 250 170 L 400 155 L 520 155" fill="none"/>
  
  <!-- Labels -->
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#E2E8F0" text-anchor="middle">
    Input
  </text>
  <text x="300" y="265" font-family="Arial, sans-serif" font-size="12" fill="#E2E8F0" text-anchor="middle">
    Learning &amp; Processing
  </text>
  <text x="560" y="160" font-family="Arial, sans-serif" font-size="12" fill="#E2E8F0" text-anchor="middle">
    Output
  </text>
  
  <!-- Bottom text -->
  <text x="300" y="285" font-family="'Courier New', monospace" font-size="14" fill="url(#aiGrad)" text-anchor="middle" opacity="0.8">
    Exploring AI · Building Solutions · Continuous Learning
  </text>
</svg>