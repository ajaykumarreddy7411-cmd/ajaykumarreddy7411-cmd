<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="statsGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#0D1117" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="url(#statsGrad)" text-anchor="middle" filter="url(#statsGlow)">
    📈 Coding Activity
  </text>
  
  <!-- Activity Graph -->
  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="170" stroke="#2D3748" stroke-width="2"/>
  <line x1="80" y1="170" x2="750" y2="170" stroke="#2D3748" stroke-width="2"/>
  
  <!-- Grid horizontal lines -->
  <line x1="80" y1="115" x2="750" y2="115" stroke="#2D3748" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="80" y1="60" x2="750" y2="60" stroke="#2D3748" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  
  <!-- Y-axis labels -->
  <text x="65" y="65" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="end">High</text>
  <text x="65" y="120" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="end">Med</text>
  <text x="65" y="175" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="end">Low</text>
  
  <!-- Animated bars -->
  <rect x="110" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="90" dur="1s" fill="freeze" />
    <animate attributeName="height" from="0" to="80" dur="1s" fill="freeze" />
  </rect>
  
  <rect x="170" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="70" dur="1s" begin="0.2s" fill="freeze" />
    <animate attributeName="height" from="0" to="100" dur="1s" begin="0.2s" fill="freeze" />
  </rect>
  
  <rect x="230" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="100" dur="1s" begin="0.4s" fill="freeze" />
    <animate attributeName="height" from="0" to="70" dur="1s" begin="0.4s" fill="freeze" />
  </rect>
  
  <rect x="290" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="65" dur="1s" begin="0.6s" fill="freeze" />
    <animate attributeName="height" from="0" to="105" dur="1s" begin="0.6s" fill="freeze" />
  </rect>
  
  <rect x="350" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="95" dur="1s" begin="0.8s" fill="freeze" />
    <animate attributeName="height" from="0" to="75" dur="1s" begin="0.8s" fill="freeze" />
  </rect>
  
  <rect x="410" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="80" dur="1s" begin="1s" fill="freeze" />
    <animate attributeName="height" from="0" to="90" dur="1s" begin="1s" fill="freeze" />
  </rect>
  
  <rect x="470" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="105" dur="1s" begin="1.2s" fill="freeze" />
    <animate attributeName="height" from="0" to="65" dur="1s" begin="1.2s" fill="freeze" />
  </rect>
  
  <rect x="530" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="75" dur="1s" begin="1.4s" fill="freeze" />
    <animate attributeName="height" from="0" to="95" dur="1s" begin="1.4s" fill="freeze" />
  </rect>
  
  <rect x="590" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="60" dur="1s" begin="1.6s" fill="freeze" />
    <animate attributeName="height" from="0" to="110" dur="1s" begin="1.6s" fill="freeze" />
  </rect>
  
  <rect x="650" y="170" width="40" height="0" fill="url(#statsGrad)" rx="3" filter="url(#statsGlow)">
    <animate attributeName="y" from="170" to="85" dur="1s" begin="1.8s" fill="freeze" />
    <animate attributeName="height" from="0" to="85" dur="1s" begin="1.8s" fill="freeze" />
  </rect>
  
  <!-- X-axis labels -->
  <text x="130" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Mon</text>
  <text x="190" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Tue</text>
  <text x="250" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Wed</text>
  <text x="310" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Thu</text>
  <text x="370" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Fri</text>
  <text x="430" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Sat</text>
  <text x="490" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Sun</text>
  <text x="550" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Mon</text>
  <text x="610" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Tue</text>
  <text x="670" y="190" font-family="Arial, sans-serif" font-size="10" fill="#4A5568" text-anchor="middle">Wed</text>
  
  <!-- Trend line -->
  <polyline points="130,90 190,70 250,100 310,65 370,95 430,80 490,105 550,75 610,60 670,85" 
            fill="none" 
            stroke="#06B6D4" 
            stroke-width="2" 
            opacity="0.5"
            stroke-dasharray="1000"
            stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="2s" begin="2s" fill="freeze" />
  </polyline>
  
  <!-- Glow effect -->
  <circle cx="400" cy="100" r="60" fill="url(#statsGrad)" opacity="0.05">
    <animate attributeName="r" values="60;70;60" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>