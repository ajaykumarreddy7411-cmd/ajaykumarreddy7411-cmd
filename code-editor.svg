<svg width="700" height="350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
      <animate attributeName="x1" values="0%;-100%;0%" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;200%;100%" dur="5s" repeatCount="indefinite" />
    </linearGradient>
    
    <filter id="codeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="700" height="350" fill="#0D1117" rx="10"/>
  
  <!-- Editor window -->
  <rect x="20" y="20" width="660" height="310" fill="#1a1f2e" rx="8" stroke="url(#codeGrad)" stroke-width="2"/>
  
  <!-- Window controls -->
  <circle cx="40" cy="40" r="6" fill="#FF5F57"/>
  <circle cx="60" cy="40" r="6" fill="#FFBD2E"/>
  <circle cx="80" cy="40" r="6" fill="#28CA42"/>
  
  <!-- Tab bar -->
