  <!-- Decorative glow effects -->
  <circle cx="650" cy="100" r="40" fill="url(#codeGrad)" opacity="0.1" filter="url(#codeGlow)">
    <animate attributeName="r" values="40;50;40" dur="4s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="50" cy="280" r="35" fill="url(#codeGrad)" opacity="0.1" filter="url(#codeGlow)">
    <animate attributeName="r" values="35;45;35" dur="5s" repeatCount="indefinite" />
  </circle>
