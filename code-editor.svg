  <text x="45" y="225" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">8</text>
  <text x="45" y="245" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">9</text>
  <text x="45" y="265" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">10</text>
  <text x="40" y="285" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">11</text>
  <text x="40" y="305" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">12</text>
  
  <!-- Code content with typing animation -->
