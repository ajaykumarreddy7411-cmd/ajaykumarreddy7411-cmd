  <text x="150" y="165" font-family="'Courier New', monospace" font-size="13" fill="#E2E8F0">count</text>
  <text x="190" y="165" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">,</text>
  <text x="200" y="165" font-family="'Courier New', monospace" font-size="13" fill="#E2E8F0">setCount</text>
  <text x="260" y="165" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">]</text>
  <text x="270" y="165" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">=</text>
  <text x="285" y="165" font-family="'Courier New', monospace" font-size="13" fill="#82AAFF">useState</text>
  <text x="345" y="165" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">(</text>
  <text x="355" y="165" font-family="'Courier New', monospace" font-size="13" fill="#F78C6C">0</text>
  <text x="365" y="165" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">);</text>
  
