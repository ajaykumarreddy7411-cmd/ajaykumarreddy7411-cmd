  <text x="45" y="145" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">4</text>
  <text x="45" y="165" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">5</text>
  <text x="45" y="185" font-family="'Courier New', monospace" font-size="13" fill="#4A5568">6</text>
