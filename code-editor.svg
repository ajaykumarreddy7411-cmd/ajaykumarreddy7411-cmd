  <text x="140" y="245" font-family="'Courier New', monospace" font-size="13" fill="#F07178">h1</text>
  <text x="160" y="245" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">&gt;</text>
  <text x="170" y="245" font-family="'Courier New', monospace" font-size="13" fill="#E2E8F0">Count:</text>
  <text x="220" y="245" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">{</text>
  <text x="230" y="245" font-family="'Courier New', monospace" font-size="13" fill="#E2E8F0">count</text>
  <text x="270" y="245" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">}</text>
  <text x="280" y="245" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">&lt;/</text>
  <text x="295" y="245" font-family="'Courier New', monospace" font-size="13" fill="#F07178">h1</text>
  <text x="315" y="245" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">&gt;</text>
  
  <!-- Line 10 -->
  <text x="130" y="265" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">&lt;</text>
  <text x="140" y="265" font-family="'Courier New', monospace" font-size="13" fill="#F07178">button</text>
  <text x="195" y="265" font-family="'Courier New', monospace" font-size="13" fill="#C792EA">onClick</text>
  <text x="255" y="265" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">=</text>
  <text x="265" y="265" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">{</text>
  <text x="275" y="265" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">()</text>
  <text x="295" y="265" font-family="'Courier New', monospace" font-size="13" fill="#C792EA">=&gt;</text>
  <text x="320" y="265" font-family="'Courier New', monospace" font-size="13" fill="#82AAFF">setCount</text>
  <text x="380" y="265" font-family="'Courier New', monospace" font-size="13" fill="#89DDFF">(</text>
  
  <!-- Cursor with blink animation -->
