<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#0D1117" rx="15"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#purpleGrad)" text-anchor="middle" filter="url(#glow2)">
    💻 Tech Arsenal
  </text>
  
  <!-- Frontend Section -->
  <text x="50" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2E8F0">
    Frontend
  </text>
  
  <!-- React -->
  <rect x="50" y="100" width="0" height="25" fill="url(#purpleGrad)" rx="5">
    <animate attributeName="width" from="0" to="320" dur="2s" fill="freeze" />
  </rect>
  <text x="60" y="118" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    React / Next.js
  </text>
  <text x="360" y="118" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" opacity="0">
    90%
    <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- Tailwind -->
  <rect x="50" y="135" width="0" height="25" fill="url(#cyanGrad)" rx="5">
    <animate attributeName="width" from="0" to="280" dur="2s" begin="0.2s" fill="freeze" />
  </rect>
  <text x="60" y="153" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    Tailwind / CSS
  </text>
  <text x="360" y="153" font-family="Arial, sans-serif" font-size="14" fill="#06B6D4" opacity="0">
    85%
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- Backend Section -->
  <text x="50" y="195" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2E8F0">
    Backend
  </text>
  
  <!-- Node.js -->
  <rect x="50" y="205" width="0" height="25" fill="url(#purpleGrad)" rx="5">
    <animate attributeName="width" from="0" to="300" dur="2s" begin="0.4s" fill="freeze" />
  </rect>
  <text x="60" y="223" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    Node.js / Express
  </text>
  <text x="360" y="223" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" opacity="0">
    88%
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- Spring Boot -->
  <rect x="50" y="240" width="0" height="25" fill="url(#cyanGrad)" rx="5">
    <animate attributeName="width" from="0" to="260" dur="2s" begin="0.6s" fill="freeze" />
  </rect>
  <text x="60" y="258" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    Spring Boot
  </text>
  <text x="360" y="258" font-family="Arial, sans-serif" font-size="14" fill="#06B6D4" opacity="0">
    82%
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- Databases Section -->
  <text x="450" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2E8F0">
    Databases
  </text>
  
  <!-- MongoDB -->
  <rect x="450" y="100" width="0" height="25" fill="url(#purpleGrad)" rx="5">
    <animate attributeName="width" from="0" to="280" dur="2s" begin="0.8s" fill="freeze" />
  </rect>
  <text x="460" y="118" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    MongoDB
  </text>
  <text x="735" y="118" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" opacity="0">
    85%
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- PostgreSQL -->
  <rect x="450" y="135" width="0" height="25" fill="url(#cyanGrad)" rx="5">
    <animate attributeName="width" from="0" to="260" dur="2s" begin="1s" fill="freeze" />
  </rect>
  <text x="460" y="153" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    PostgreSQL
  </text>
  <text x="735" y="153" font-family="Arial, sans-serif" font-size="14" fill="#06B6D4" opacity="0">
    80%
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- AI/ML Section -->
  <text x="450" y="195" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2E8F0">
    AI/ML & Tools
  </text>
  
  <!-- Python/ML -->
  <rect x="450" y="205" width="0" height="25" fill="url(#purpleGrad)" rx="5">
    <animate attributeName="width" from="0" to="290" dur="2s" begin="1.2s" fill="freeze" />
  </rect>
  <text x="460" y="223" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    Python / scikit-learn
  </text>
  <text x="735" y="223" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" opacity="0">
    87%
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- Cloud Tools -->
  <rect x="450" y="240" width="0" height="25" fill="url(#cyanGrad)" rx="5">
    <animate attributeName="width" from="0" to="270" dur="2s" begin="1.4s" fill="freeze" />
  </rect>
  <text x="460" y="258" font-family="Arial, sans-serif" font-size="14" fill="#E2E8F0">
    AWS / Git / Vercel
  </text>
  <text x="735" y="258" font-family="Arial, sans-serif" font-size="14" fill="#06B6D4" opacity="0">
    83%
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.5s" fill="freeze" />
  </text>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="320" r="40" fill="none" stroke="url(#purpleGrad)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="400" cy="320" r="30" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="30;40;30" dur="3s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Code brackets -->
  <text x="400" y="335" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="url(#purpleGrad)" text-anchor="middle" filter="url(#glow2)">
    { }
  </text>
  
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="12" fill="#E2E8F0" text-anchor="middle" opacity="0.6">
    Building the future, one line at a time
  </text>
</svg>