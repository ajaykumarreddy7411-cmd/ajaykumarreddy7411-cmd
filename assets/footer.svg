<svg width="800" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footerLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7a00ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="80" fill="transparent"/>

  <rect x="100" y="10" width="600" height="1" fill="url(#footerLine)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>
  
  <text x="400" y="45" font-family="'Inter', monospace" font-size="12" fill="#8080a0" text-anchor="middle" letter-spacing="2">
    DESIGNED &amp; ENGINEERED BY <tspan fill="#ffffff" font-weight="bold">AJAY KUMAR</tspan>
  </text>
  <text x="400" y="65" font-family="'Inter', monospace" font-size="10" fill="#505070" text-anchor="middle" letter-spacing="3">
    SYSTEM . ONLINE
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>
