<svg width="1140" height="280" viewBox="0 0 1140 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0a0015;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:1" />
    </linearGradient>
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#7a00ff" opacity="0.15"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  
  <rect width="1140" height="280" fill="#0a0015" rx="12"/>
  <rect width="1140" height="280" fill="url(#dotGrid)" rx="12"/>
  <rect x="2" y="2" width="1136" height="276" fill="url(#cardBg)" rx="10"/>
  <rect width="1140" height="280" fill="url(#scanlines)" rx="12" pointer-events="none"/>
  
  <rect x="0" y="0" width="1140" height="280" fill="none" stroke="url(#borderGrad)" stroke-width="2" rx="12" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <text x="567" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ff003c" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="567; 565; 567; 575; 567" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    About Me
  </text>
  <text x="573" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#00f0ff" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="573; 575; 573; 565; 573" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    About Me
  </text>
  <text x="570" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    About Me
  </text>
  
  <line x1="470" y1="95" x2="670" y2="95" stroke="url(#borderGrad)" stroke-width="2" opacity="0.6"/>
  
  <text x="570" y="140" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0" text-anchor="middle">
    Passionate about building impactful and useful software that solves real problems.
  </text>
  
  <text x="570" y="175" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0" text-anchor="middle">
    Strong interest in AI and emerging technologies with a curious builder mindset.
  </text>
  
  <text x="570" y="210" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0" text-anchor="middle">
    Love learning modern tech stacks and exploring innovative solutions.
  </text>
  
  <circle cx="100" cy="140" r="4" fill="#7a00ff" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1040" cy="140" r="4" fill="#00f0ff" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
