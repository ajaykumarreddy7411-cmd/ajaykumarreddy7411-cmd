<svg width="960" height="100" viewBox="0 0 960 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <text x="480" y="55" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#techGrad)" text-anchor="middle">
    Technology Stack
  </text>
  
  <line x1="280" y1="75" x2="680" y2="75" stroke="url(#techGrad)" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <circle cx="260" cy="75" r="5" fill="#7a00ff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="75" r="5" fill="#00f0ff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>