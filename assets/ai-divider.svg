<svg width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="800" height="150" fill="transparent"/>
  <rect width="800" height="150" fill="url(#scanlines)" pointer-events="none"/>
  
  <g fill="none" stroke-width="1.5" opacity="0.6" filter="url(#glowDark)">
    <path d="M 100 75 L 250 75 L 300 40 L 500 40 L 550 75 L 700 75" stroke="#7a00ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 150 75 L 200 110 L 600 110 L 650 75" stroke="#00f0ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    </path>
    <circle cx="250" cy="75" r="4" fill="#00f0ff"/>
    <circle cx="550" cy="75" r="4" fill="#00f0ff"/>
    <circle cx="300" cy="40" r="4" fill="#7a00ff"/>
    <circle cx="500" cy="40" r="4" fill="#7a00ff"/>
    <circle cx="200" cy="110" r="3" fill="#ffffff"/>
    <circle cx="600" cy="110" r="3" fill="#ffffff"/>
    <circle cx="400" cy="40" r="5" fill="#00f0ff">
      <animate attributeName="r" values="3;7;3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="397" y="82" font-family="'Inter', Arial, sans-serif" font-size="16" font-style="italic" font-weight="600" fill="#ff003c" text-anchor="middle" letter-spacing="1" opacity="0.8">
    <animate attributeName="x" values="397; 395; 397; 405; 397" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    "ARCHITECTING INTELLIGENCE. BUILDING THE FUTURE."
  </text>
  <text x="403" y="82" font-family="'Inter', Arial, sans-serif" font-size="16" font-style="italic" font-weight="600" fill="#00f0ff" text-anchor="middle" letter-spacing="1" opacity="0.8">
    <animate attributeName="x" values="403; 405; 403; 395; 403" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    "ARCHITECTING INTELLIGENCE. BUILDING THE FUTURE."
  </text>
  <text x="400" y="82" font-family="'Inter', Arial, sans-serif" font-size="16" font-style="italic" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    "ARCHITECTING INTELLIGENCE. BUILDING THE FUTURE."
  </text>
  <rect x="250" y="95" width="300" height="1" fill="#7a00ff" opacity="0.4"/>
</svg>
