<svg width="1080" height="180" viewBox="0 0 1080 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="aiGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  
  <rect width="1080" height="180" fill="url(#scanlines)" pointer-events="none"/>
  
  <line x1="100" y1="90" x2="980" y2="90" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <g opacity="0.7">
    <circle cx="200" cy="90" r="3" fill="#7a00ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="90" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="90" r="4" fill="#7a00ff" filter="url(#aiGlow)">
      <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="90" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="90" r="3" fill="#7a00ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <line x1="200" y1="90" x2="350" y2="90" stroke="#7a00ff" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="350" y1="90" x2="540" y2="90" stroke="#00f0ff" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="540" y1="90" x2="730" y2="90" stroke="#7a00ff" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.2s" repeatCount="indefinite"/>
  </line>
  <line x1="730" y1="90" x2="880" y2="90" stroke="#00f0ff" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.9s" repeatCount="indefinite"/>
  </line>
  
  <text x="537" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#ff003c" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="537; 535; 537; 545; 537" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    Focused on AI-Driven Innovation
  </text>
  <text x="543" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#00f0ff" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="543; 545; 543; 535; 543" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    Focused on AI-Driven Innovation
  </text>
  <text x="540" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="url(#aiGrad)" text-anchor="middle" filter="url(#aiGlow)">
    Focused on AI-Driven Innovation
  </text>
  
  <text x="540" y="145" font-family="Arial, sans-serif" font-size="17" fill="#e0e0e0" text-anchor="middle">
    Exploring machine learning and intelligent systems to build the future of technology
  </text>
</svg>
