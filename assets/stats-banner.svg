<svg width="1200" height="80" viewBox="0 0 1200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:1" />
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="80" fill="url(#scanlines)" pointer-events="none"/>
  
  <text x="597" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ff003c" text-anchor="middle" letter-spacing="4" opacity="0.8">
    <animate attributeName="x" values="597; 595; 597; 605; 597" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    📊 GITHUB ANALYTICS 📊
  </text>
  <text x="603" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#00f0ff" text-anchor="middle" letter-spacing="4" opacity="0.8">
    <animate attributeName="x" values="603; 605; 603; 595; 603" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    📊 GITHUB ANALYTICS 📊
  </text>
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#cyberGrad)" text-anchor="middle" letter-spacing="4">
    📊 GITHUB ANALYTICS 📊
  </text>
  
  <line x1="280" y1="70" x2="920" y2="70" stroke="url(#cyberGrad)" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <circle cx="260" cy="70" r="5" fill="#7a00ff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="70" r="5" fill="#00f0ff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
