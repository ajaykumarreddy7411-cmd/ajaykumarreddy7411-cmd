<svg width="840" height="90" viewBox="0 0 840 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:1" />
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  
  <rect width="840" height="90" fill="url(#scanlines)" pointer-events="none"/>
  
  <text x="417" y="50" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ff003c" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="417; 415; 417; 425; 417" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    Connect With Me
  </text>
  <text x="423" y="50" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#00f0ff" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="423; 425; 423; 415; 423" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    Connect With Me
  </text>
  <text x="420" y="50" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="url(#contactGrad)" text-anchor="middle">
    Connect With Me
  </text>
  
  <line x1="260" y1="68" x2="580" y2="68" stroke="url(#contactGrad)" stroke-width="2" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <circle cx="240" cy="68" r="5" fill="#7a00ff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="68" r="5" fill="#00f0ff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
