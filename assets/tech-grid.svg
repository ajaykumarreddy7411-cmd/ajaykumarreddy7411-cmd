<svg width="1140" height="560" viewBox="0 0 1140 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1a0033;stop-opacity:0.35" />
    </linearGradient>
    <linearGradient id="badgeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#001a33;stop-opacity:0.35" />
    </linearGradient>
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.6" />
    </linearGradient>
    <filter id="techGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="techGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#7a00ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <rect width="1140" height="560" fill="url(#techGrid)"/>
  
  <g>
    <rect x="70" y="30" width="240" height="90" fill="url(#badgeGrad1)" stroke="#7a00ff" stroke-width="2" rx="10" filter="url(#techGlow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="85" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#7a00ff" letter-spacing="1">LANGUAGES</text>
    <text x="190" y="80" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Python</text>
    <text x="190" y="100" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">JavaScript • Java • C</text>
  </g>
  
  <g>
    <rect x="340" y="30" width="460" height="90" fill="url(#badgeGrad2)" stroke="#00f0ff" stroke-width="2" rx="10" filter="url(#techGlow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="355" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#00f0ff" letter-spacing="1">FRONTEND</text>
    <text x="570" y="78" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">React • Next.js</text>
    <text x="570" y="100" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">HTML/CSS • Tailwind CSS</text>
  </g>
  
  <g>
    <rect x="830" y="30" width="240" height="90" fill="url(#badgeGrad1)" stroke="#7a00ff" stroke-width="2" rx="10" filter="url(#techGlow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="845" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#7a00ff" letter-spacing="1">BACKEND</text>
    <text x="950" y="78" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Node.js • Express</text>
    <text x="950" y="100" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Spring Boot • REST APIs</text>
  </g>
  
  <g>
    <rect x="70" y="150" width="360" height="90" fill="url(#badgeGrad2)" stroke="#00f0ff" stroke-width="2" rx="10" filter="url(#techGlow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="85" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#00f0ff" letter-spacing="1">DATABASES</text>
    <text x="250" y="205" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">MongoDB</text>
    <text x="250" y="225" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">PostgreSQL • MySQL</text>
  </g>
  
  <g>
    <rect x="460" y="150" width="200" height="90" fill="url(#badgeGrad1)" stroke="#7a00ff" stroke-width="2" rx="10" filter="url(#techGlow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="475" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#7a00ff" letter-spacing="1">AI / ML</text>
    <text x="560" y="205" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">scikit-learn</text>
    <text x="560" y="225" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">TensorFlow</text>
  </g>
  
  <g>
    <rect x="690" y="150" width="380" height="90" fill="url(#badgeGrad2)" stroke="#00f0ff" stroke-width="2" rx="10" filter="url(#techGlow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="705" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#00f0ff" letter-spacing="1">TOOLS &amp; PLATFORMS</text>
    <text x="880" y="200" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Git • GitHub • AWS</text>
    <text x="880" y="220" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Postman • Vercel</text>
  </g>
  
  <g opacity="0.5">
    <line x1="100" y1="290" x2="1040" y2="290" stroke="url(#borderShine)" stroke-width="1.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </line>
    <circle cx="200" cy="290" r="3" fill="#7a00ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="570" cy="290" r="5" fill="url(#neuralGrad)" filter="url(#techGlow)">
      <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="940" cy="290" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <line x1="200" y1="290" x2="570" y2="290" stroke="#7a00ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="570" y1="290" x2="940" y2="290" stroke="#00f0ff" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <rect x="70" y="330" width="1000" height="200" fill="#0a0015" stroke="url(#borderShine)" stroke-width="2.5" rx="12" opacity="0.5"/>
  <rect x="72" y="332" width="996" height="196" fill="url(#badgeGrad1)" rx="10"/>
  
  <g opacity="0.2">
    <circle cx="200" cy="380" r="60" fill="none" stroke="#7a00ff" stroke-width="1">
      <animate attributeName="r" values="60;65;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="940" cy="480" r="50" fill="none" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="r" values="50;55;50" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <text x="570" y="375" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="url(#neuralGrad)" text-anchor="middle" filter="url(#techGlow)">
    ENGINEERING STUDENT
  </text>
  
  <line x1="370" y1="390" x2="770" y2="390" stroke="url(#borderShine)" stroke-width="1.5" opacity="0.5"/>
  
  <text x="570" y="425" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Combining academic rigor with hands-on development experience
  </text>
  <text x="570" y="455" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Continuously exploring cutting-edge technologies and best practices
  </text>
  <text x="570" y="485" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Focused on creating efficient, scalable, and intelligent solutions
  </text>
  
  <g opacity="0.4">
    <circle cx="150" cy="430" r="2" fill="#7a00ff">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="990" cy="430" r="2" fill="#00f0ff">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
