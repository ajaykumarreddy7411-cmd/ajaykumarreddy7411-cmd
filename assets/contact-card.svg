<svg width="1080" height="220" viewBox="0 0 1080 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emailBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="linkedinBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0015;stop-opacity:0.3" />
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  
  <rect width="1080" height="220" fill="url(#scanlines)" pointer-events="none"/>
  
  <g>
    <rect x="80" y="40" width="420" height="140" fill="url(#cardFill)" stroke="url(#emailBorder)" stroke-width="2" rx="10" opacity="0.95">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
    </rect>
    
    <text x="290" y="85" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#7a00ff" text-anchor="middle">
      Email
    </text>
    
    <text x="290" y="120" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">
      akumar23755@gmail.com
    </text>
    
    <rect x="200" y="140" width="180" height="25" fill="none" stroke="#7a00ff" stroke-width="1.5" rx="12" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="290" y="158" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
      Send Message
    </text>
  </g>
  
  <g>
    <rect x="580" y="40" width="420" height="140" fill="url(#cardFill)" stroke="url(#linkedinBorder)" stroke-width="2" rx="10" opacity="0.95">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    
    <text x="790" y="85" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#00f0ff" text-anchor="middle">
      LinkedIn
    </text>
    
    <text x="790" y="120" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">
      ajay-kumar-reddy7411
    </text>
    
    <rect x="700" y="140" width="180" height="25" fill="none" stroke="#00f0ff" stroke-width="1.5" rx="12" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="790" y="158" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">
      View Profile
    </text>
  </g>
</svg>
