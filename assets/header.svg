<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0015;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7a00ff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#scanlines)" pointer-events="none"/>
  
  <g opacity="0.3">
    <circle cx="200" cy="100" r="80" fill="none" stroke="#7a00ff" stroke-width="1">
      <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="300" r="100" fill="none" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="r" values="100;110;100" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <line x1="150" y1="150" x2="300" y2="80" stroke="#7a00ff" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="900" y1="120" x2="1050" y2="280" stroke="#00f0ff" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="400" y1="100" x2="800" y2="100" stroke="#7a00ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="300" x2="800" y2="300" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  
  <text x="597" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ff003c" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="597; 595; 597; 605; 597" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3s" keyTimes="0; 0.1; 0.15; 0.2; 1" repeatCount="indefinite"/>
    AJAY KUMAR
  </text>
  <text x="603" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#00f0ff" text-anchor="middle" opacity="0.8">
    <animate attributeName="x" values="603; 605; 603; 595; 603" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0; 0.8; 0; 0.8; 0" dur="3.1s" keyTimes="0; 0.15; 0.2; 0.25; 1" repeatCount="indefinite"/>
    AJAY KUMAR
  </text>
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">
    AJAY KUMAR
  </text>
  
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Building Intelligent Systems • Full Stack Architect • AI Explorer
  </text>
  
  <g opacity="0.5">
    <circle cx="300" cy="320" r="3" fill="#7a00ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="80" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="50" r="2" fill="#7a00ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="350" r="2" fill="#00f0ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
