    <rect x="780" y="50" width="280" height="60" fill="url(#badgeGrad1)" stroke="#7a00ff" stroke-width="1.5" rx="8" opacity="0.9">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="920" y="75" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Node.js • Express</text>
    <text x="920" y="95" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Spring Boot • REST APIs</text>
  </g>
  
  <text x="80" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#00f0ff">Databases</text>
  <g>
    <rect x="80" y="180" width="320" height="60" fill="url(#badgeGrad2)" stroke="#00f0ff" stroke-width="1.5" rx="8" opacity="0.9">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="240" y="215" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">MongoDB • PostgreSQL • MySQL</text>
  </g>
  
  <text x="450" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#7a00ff">AI/ML</text>
  <g>
    <rect x="450" y="180" width="180" height="60" fill="url(#badgeGrad1)" stroke="#7a00ff" stroke-width="1.5" rx="8" opacity="0.9">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="540" y="215" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">scikit-learn</text>
  </g>
  
  <text x="680" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#00f0ff">Tools</text>
  <g>
    <rect x="680" y="180" width="380" height="60" fill="url(#badgeGrad2)" stroke="#00f0ff" stroke-width="1.5" rx="8" opacity="0.9">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="870" y="205" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Git • GitHub • AWS</text>
    <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Postman • Vercel</text>
  </g>
  
  <g opacity="0.3">
    <line x1="80" y1="280" x2="1060" y2="280" stroke="url(#borderShine)" stroke-width="1"/>
    <circle cx="570" cy="280" r="4" fill="#7a00ff">
      <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <rect x="80" y="320" width="980" height="180" fill="#0a0015" stroke="url(#borderShine)" stroke-width="2" rx="10" opacity="0.3"/>
  <text x="570" y="370" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">
    Engineering Student
  </text>
  <text x="570" y="405" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Combining academic rigor with hands-on development experience
  </text>
  <text x="570" y="435" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Continuously exploring cutting-edge technologies and best practices
  </text>
  <text x="570" y="465" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Focused on creating efficient, scalable, and intelligent solutions
  </text>
