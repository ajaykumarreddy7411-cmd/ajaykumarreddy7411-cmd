    </rect>
    <text x="540" y="85" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">React • Next.js • HTML/CSS • Tailwind CSS</text>
  </g>
  
  <text x="780" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#7a00ff">Backend</text>
