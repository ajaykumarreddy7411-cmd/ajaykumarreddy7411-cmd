<svg width="1140" height="520" viewBox="0 0 1140 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1a0033;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="badgeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#001a33;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <text x="80" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#7a00ff">Languages</text>
  <g>
    <rect x="80" y="50" width="220" height="60" fill="url(#badgeGrad1)" stroke="#7a00ff" stroke-width="1.5" rx="8" opacity="0.9">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="190" y="85" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Python • JavaScript • Java • C</text>
  </g>
  
  <text x="350" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#00f0ff">Frontend</text>
  <g>
    <rect x="350" y="50" width="380" height="60" fill="url(#badgeGrad2)" stroke="#00f0ff" stroke-width="1.5" rx="8" opacity="0.9">
