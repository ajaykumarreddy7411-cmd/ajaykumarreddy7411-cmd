<svg width="100%" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.8" />
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;200%;100%" dur="10s" repeatCount="indefinite" />
    </linearGradient>
    
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.5" />
      <animate attributeName="x1" values="100%;0%;100%" dur="8s" repeatCount="indefinite" />
      <animate attributeName="x2" values="200%;100%;200%" dur="8s" repeatCount="indefinite" />
    </linearGradient>
    
    <linearGradient id="waveGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
      <animate attributeName="x1" values="0%;-100%;0%" dur="12s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;0%;100%" dur="12s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="120" fill="#0D1117"/>
  
  <!-- Wave 1 (back) -->
  <path d="M0,40 Q300,10 600,40 T1200,40 L1200,120 L0,120 Z" fill="url(#waveGrad3)">
    <animate attributeName="d" 
             values="M0,40 Q300,10 600,40 T1200,40 L1200,120 L0,120 Z;
                     M0,50 Q300,20 600,50 T1200,50 L1200,120 L0,120 Z;
                     M0,40 Q300,10 600,40 T1200,40 L1200,120 L0,120 Z"
             dur="8s" 
             repeatCount="indefinite" />
  </path>
  
  <!-- Wave 2 (middle) -->
  <path d="M0,60 Q300,30 600,60 T1200,60 L1200,120 L0,120 Z" fill="url(#waveGrad2)">
    <animate attributeName="d" 
             values="M0,60 Q300,30 600,60 T1200,60 L1200,120 L0,120 Z;
                     M0,55 Q300,35 600,55 T1200,55 L1200,120 L0,120 Z;
                     M0,60 Q300,30 600,60 T1200,60 L1200,120 L0,120 Z"
             dur="6s" 
             repeatCount="indefinite" />
  </path>
  
  <!-- Wave 3 (front) -->
  <path d="M0,80 Q300,50 600,80 T1200,80 L1200,120 L0,120 Z" fill="url(#waveGrad1)">
    <animate attributeName="d" 
             values="M0,80 Q300,50 600,80 T1200,80 L1200,120 L0,120 Z;
                     M0,75 Q300,55 600,75 T1200,75 L1200,120 L0,120 Z;
                     M0,80 Q300,50 600,80 T1200,80 L1200,120 L0,120 Z"
             dur="5s" 
             repeatCount="indefinite" />
  </path>
  
  <!-- Sparkles -->
  <circle cx="200" cy="30" r="2" fill="#A78BFA">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="30;25;30" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="500" cy="45" r="2" fill="#06B6D4">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="cy" values="45;40;45" dur="4s" begin="1s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="800" cy="35" r="2" fill="#A78BFA">
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="0.5s" repeatCount="indefinite" />
    <animate attributeName="cy" values="35;30;35" dur="3.5s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="1000" cy="50" r="2" fill="#06B6D4">
    <animate attributeName="opacity" values="0;1;0" dur="4.5s" begin="1.5s" repeatCount="indefinite" />
    <animate attributeName="cy" values="50;45;50" dur="4.5s" begin="1.5s" repeatCount="indefinite" />
  </circle>
</svg>